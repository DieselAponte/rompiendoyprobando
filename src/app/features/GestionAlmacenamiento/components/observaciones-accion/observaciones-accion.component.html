<div class="observaciones-container">
    <mat-form-field appearance="fill" class="observaciones-field">
        <h3>Observaciones</h3>
        <input matInput class="custom-input" [(ngModel)]="texto"
            placeholder="Ingrese las observaciones respecto al movimiento de inventario, cuál es la razón y lotes a movilizarse." />
    </mat-form-field>
    <div class="acciones">
        <button mat-raised-button color="primary" (click)="despachar()" [disabled]="!texto.trim()">Despachar</button>
    </div>
</div>
