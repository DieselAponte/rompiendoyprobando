<mat-sidenav-container class="layout-container">
  <!-- SIDEBAR -->
  <mat-sidenav #sidenav mode="side" [opened]="sidebarOpen" class="sidebar">
    <h3 class="sidebar-title">Módulos</h3>
    <mat-nav-list>
      <a mat-list-item routerLink="/GestionProgramacion" routerLinkActive="active">Gestión de Programación</a>
      <a mat-list-item routerLink="/GestionCompras" routerLinkActive="active">Gestión de Compras</a>
      <a mat-list-item routerLink="/GestionDistribucion" routerLinkActive="active">Gestión de Distribución</a>
      <a mat-list-item routerLink="/GestionAlmacenamiento" routerLinkActive="active">Gestión de Almacenamiento</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- MAIN CONTENT AREA -->
  <mat-sidenav-content>
    <!-- NAVBAR -->
    <mat-toolbar color="primary" class="navbar">
      <button mat-icon-button (click)="toggleSidebar()">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="app-title">Sistema Hospitalario</span>

      <span class="spacer"></span>

      <button mat-raised-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon> Cerrar sesión
      </button>
    </mat-toolbar>

    <!-- CONTENT AREA -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
